<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tom's Chicken - Book a Table</title>
    
    <link href="Bootstrap/Content/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --toms-orange: #f57d10ff;
            --toms-dark: #212529;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8f9fa;
            padding-bottom: 80px; /* Space for mobile floating button */
        }

        /* NAVBAR (Matches Home Page) */
        .navbar { box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-link { font-weight: 600; color: var(--toms-dark) !important; }
        .nav-link.active { color: var(--toms-orange) !important; }

        /* MOBILE OPTIMIZED CONTAINER */
        .mobile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        .booking-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            background: white;
            margin-bottom: 20px;
        }

        .card-header-orange {
            background-color: var(--toms-orange);
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* FORM INPUTS (Big and Touchable) */
        .form-control, .form-select {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #dee2e6;
            font-size: 1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--toms-orange);
            box-shadow: 0 0 0 0.2rem rgba(245, 125, 16, 0.25);
        }

        /* PAYMENT SECTION */
        .payment-box {
            background: #fff3cd;
            border: 1px solid #ffe69c;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: white;
            border: 2px dashed #ffc107;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        
        /* FLOATING BOTTOM BUTTON FOR MOBILE */
        .floating-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .btn-orange {
            background-color: var(--toms-orange);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            padding: 12px;
            font-size: 1.1rem;
            border: none;
            width: 100%;
        }
        .btn-orange:hover { background-color: #d1660a; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container mobile-container py-0">
            <a class="navbar-brand fw-bold fs-4" href="index.html" style="color: var(--toms-orange);">
                <i class="fa-solid fa-arrow-left text-dark me-2" onclick="history.back(); return false;"></i> 
                Tom's<span class="text-dark">Chicken</span>
            </a>
        </div>
    </nav>

    <div class="container mobile-container mt-3">
        
        <form id="reservationForm">
            <div class="booking-card">
                <div class="card-header-orange">
                    <h4 class="mb-0 fw-bold"><i class="fa-solid fa-calendar-alt"></i> Booking Details</h4>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label fw-bold small text-muted">Date</label>
                            <input type="date" id="resDate" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold small text-muted">Time</label>
                            <input type="time" id="resTime" class="form-control" required>
                        </div>
                        
                        <div class="col-6 mt-3">
                            <label class="form-label fw-bold small text-muted">No. of People</label>
                            <input type="number" id="resPax" class="form-control" min="1" value="2" required>
                        </div>
                        <div class="col-6 mt-3">
                            <label class="form-label fw-bold small text-muted">Table Type</label>
                            <select id="resTableSize" class="form-select" required>
                                <option value="2-Person">2-Person</option>
                                <option value="4-Person">4-Person</option>
                                <option value="6-Person">6-Person</option>
                                <option value="8-Person">8-Person</option>
                                <option value="10+ Person">10+ Person</option>
                            </select>
                        </div>

                        <div class="col-12 mt-4">
                            <label class="form-label fw-bold small text-muted">Advance Order (Optional)</label>
                            <textarea id="resNotes" class="form-control" rows="2" placeholder="e.g. CH1-x2, Sol-x1"></textarea>
                            <small class="text-muted" style="font-size: 0.75rem;">Skip the line! Order your unli-promo now.</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="booking-card">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3"><i class="fa-solid fa-wallet text-orange"></i> Reservation Fee</h5>
                    <p class="text-muted small mb-3">To secure your table, a downpayment of <b>₱500</b> is required. This will be deducted from your final bill.</p>
                    
                    <div class="payment-box mb-4">
                        <h6 class="fw-bold text-dark mb-1">GCash / PayMaya</h6>
                        <p class="mb-2 small">Send to: <b>0912 345 6789</b></p>
                        <div class="qr-placeholder">
                            <i class="fa-solid fa-qrcode fa-3x text-muted opacity-50"></i>
                            </div>
                    </div>

                    <label class="form-label fw-bold small text-muted">Upload Payment Receipt</label>
                    <input type="file" id="resReceipt" class="form-control" accept="image/*" required>
                    <input type="hidden" id="receiptBase64">
                </div>
            </div>

            <div class="floating-bottom">
                <button type="submit" id="submitBtn" class="btn btn-orange shadow"><i class="fa-solid fa-check-circle"></i> Confirm & Pay ₱500</button>
            </div>
        </form>
    </div>

    <script src="Bootstrap/Scripts/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { auth, db, ref, get, push, onAuthStateChanged } from "./js/firebase-config.js";

        let currentUserName = "Unknown Customer";
        
        // 1. SECURITY: Must be logged in
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                alert("Please login to book a table.");
                window.location.href = "login.html";
            } else {
                // Fetch the user's name from DB so we can attach it to the reservation
                const snap = await get(ref(db, 'users/' + user.uid));
                if (snap.exists()) {
                    currentUserName = `${snap.val().firstName} ${snap.val().lastName}`;
                }
            }
        });

        // 2. SET MINIMUM DATE TO TODAY
        const dateInput = document.getElementById('resDate');
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
        dateInput.value = today;

        // 3. DYNAMIC TABLE LOGIC (Same as Admin)
        document.getElementById('resPax').addEventListener('input', function() {
            const pax = parseInt(this.value) || 1;
            const select = document.getElementById('resTableSize');
            Array.from(select.options).forEach(option => {
                let capacity = 10;
                if (option.value === "2-Person") capacity = 2;
                else if (option.value === "4-Person") capacity = 4;
                else if (option.value === "6-Person") capacity = 6;
                else if (option.value === "8-Person") capacity = 8;
                
                if (pax > capacity) { option.disabled = true; option.hidden = true; } 
                else { option.disabled = false; option.hidden = false; }
            });
            const firstAvailable = Array.from(select.options).find(opt => !opt.disabled);
            if (firstAvailable) select.value = firstAvailable.value;
        });

        // 4. IMAGE CONVERTER (The "Trick" for Thesis Demos)
        // Converts uploaded image to text so we can save it directly to the Database without Storage APIs
        document.getElementById('resReceipt').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('receiptBase64').value = reader.result;
            }
            if (file) {
                reader.readAsDataURL(file);
            }
        });

        // 5. SUBMIT FORM
        document.getElementById('reservationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            const receiptData = document.getElementById('receiptBase64').value;
            
            try {
                // A. PUSH TO RESERVATIONS TABLE
                await push(ref(db, 'reservations'), {
                    name: currentUserName,
                    date: document.getElementById('resDate').value,
                    time: document.getElementById('resTime').value,
                    pax: document.getElementById('resPax').value,
                    tableSize: document.getElementById('resTableSize').value,
                    notes: document.getElementById('resNotes').value,
                    type: 'online',
                    status: 'pending' // Admin must approve it
                });

                // B. PUSH TO PAYMENTS TABLE
                await push(ref(db, 'payments'), {
                    customerName: currentUserName,
                    amount: "500",
                    category: "Online Reservation",
                    timestamp: Date.now(),
                    status: "pending", // Admin must verify it
                    receiptUrl: receiptData // The converted Base64 image
                });

                alert("Reservation submitted successfully! Please wait for Admin approval.");
                window.location.href = "index.html";

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
                btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm & Pay ₱500';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
