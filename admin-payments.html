<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Payments</title>
    <link href="Bootstrap/Content/bootstrap.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      :root {
        --toms-orange: #f57d10ff;
        --sidebar-width: 250px;
      }
      body {
        background-color: #f8f9fa;
        overflow-x: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        background: #212529;
        color: white;
        z-index: 999;
      }
      .sidebar-header {
        padding: 20px;
        background: var(--toms-orange);
      }
      .sidebar-menu {
        padding: 20px 0;
        list-style: none;
        margin: 0;
      }
      .sidebar-menu li a {
        display: block;
        padding: 15px 25px;
        color: #adb5bd;
        text-decoration: none;
        border-left: 4px solid transparent;
      }
      .sidebar-menu li a:hover,
      .sidebar-menu li a.active {
        color: white;
        background: rgba(255, 255, 255, 0.1);
        border-left-color: var(--toms-orange);
      }
      .sidebar-menu i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
      }
      .main-content {
        margin-left: var(--sidebar-width);
        padding: 30px;
      }
      .receipt-img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        max-height: 60vh;
        object-fit: contain;
      }
      .btn-orange {
        background-color: var(--toms-orange);
        color: white;
        border: none;
      }
      .btn-orange:hover {
        background-color: #d1660a;
        color: white;
      }
      .nav-pills .nav-link.active {
        background-color: var(--toms-orange);
      }
      .nav-pills .nav-link {
        color: #212529;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="sidebar-header">
        <h4 class="mb-0 fw-bold">Tom's Admin</h4>
      </div>
      <ul class="sidebar-menu">
        <li>
          <a href="admin.html"
            ><i class="fa-solid fa-gauge-high"></i> Dashboard</a
          >
        </li>
        <li>
          <a href="admin-payments.html" class="active"
            ><i class="fa-solid fa-money-bill-wave"></i> Payments</a
          >
        </li>
        <li>
          <a href="admin-tables.html"
            ><i class="fa-solid fa-chair"></i> Tables</a
          >
        </li>
        <li>
          <a href="admin-reservations.html"
            ><i class="fa-solid fa-calendar-check"></i> Reservations</a
          >
        </li>
        <li>
          <a href="admin-users.html"
            ><i class="fa-solid fa-user-shield"></i> Admins</a
          >
        </li>
        <li class="mt-5">
          <a href="#" id="adminLogoutBtn" class="text-danger"
            ><i class="fa-solid fa-right-from-bracket"></i> Logout</a
          >
        </li>
      </ul>
    </nav>

    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Payment Management</h2>
        <button
          onclick="addFakePayment()"
          class="btn btn-outline-secondary btn-sm"
        >
          <i class="fa fa-plus"></i> Add Test Data
        </button>
      </div>

      <ul class="nav nav-pills mb-3" id="paymentTabs">
        <li class="nav-item">
          <a
            class="nav-link active"
            href="#"
            onclick="filterPayments('pending', event)"
            >Pending Verification</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            href="#"
            onclick="filterPayments('history', event)"
            >Payment History</a
          >
        </li>
      </ul>

      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>Ref ID</th>
                  <th>Customer Name</th>
                  <th>Category</th>
                  <th>Date & Time</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="paymentsTableBody">
                <tr>
                  <td colspan="7" class="text-center text-muted">
                    Loading payments...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="receiptModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Payment Proof</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body text-center bg-light">
            <img
              id="modalReceiptImg"
              src=""
              alt="Receipt"
              class="receipt-img shadow-sm mb-3 bg-white p-2 border"
            />
            <h4 id="modalCustomerName" class="fw-bold"></h4>
            <h4 id="modalAmount" class="fw-bold"></h4>
          </div>
          <div class="modal-footer justify-content-center" id="modalActions">
            <button
              type="button"
              id="rejectBtn"
              class="btn btn-danger px-4 fw-bold"
            >
              Reject
            </button>
            <button
              type="button"
              id="approveBtn"
              class="btn btn-success px-4 fw-bold"
            >
              Approve
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="Bootstrap/Scripts/bootstrap.bundle.min.js"></script>

    <script type="module">
      import {
        auth,
        db,
        ref,
        get,
        onAuthStateChanged,
        onValue,
        update,
        push,
        signOut,
      } from "./js/firebase-config.js";

      const receiptModal = new bootstrap.Modal(
        document.getElementById("receiptModal"),
      );
      let currentPaymentId = null;
      let allPayments = [];
      let currentView = "pending"; // tracks which tab we are on

      // check if user is admin
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }
        currentUserUid = user.uid;
        const snap = await get(ref(db, "users/" + user.uid));
        if (!snap.exists() || snap.val().role !== "admin") {
          window.location.href = "login.html";
        }
      }); //----------- End of admin Check

      // get all payments data and update in real-time
      const paymentsRef = ref(db, "payments");
      onValue(paymentsRef, (snapshot) => {
        allPayments = [];
        if (snapshot.exists()) {
          snapshot.forEach((child) => {
            const data = child.val();
            // Convert timestamp to readable date/time
            const dateObj = new Date(data.timestamp || Date.now());

            allPayments.push({
              id: child.key,
              ...data,
              rawTime: data.timestamp || 0,
              formattedDate: dateObj.toLocaleDateString(),
              formattedTime: dateObj.toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              }),
            });
          });
        }
        renderTable();
      }); //----------- End of Payment Data

      // create the table
      function renderTable() {
        const tbody = document.getElementById("paymentsTableBody");
        tbody.innerHTML = "";

        // filter data based on selection
        let filtered = allPayments.filter((p) => {
          if (currentView === "pending") return p.status === "pending";
          if (currentView === "history") return p.status !== "pending";
        });

        // Sort newest first
        filtered.sort((a, b) => b.rawTime - a.rawTime);

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">No data found in this category.</td></tr>`;
          return;
        }

        filtered.forEach((p) => {
          // Create status badge with colors
          let statusBadge = "";
          if (p.status === "pending") {
            statusBadge =
              '<span class="badge bg-warning text-dark">Pending</span>';
          } else if (p.status === "approved") {
            statusBadge = '<span class="badge bg-success">Approved</span>';
          } else {
            statusBadge = '<span class="badge bg-danger">Rejected</span>';
          }

          let catBadge = "";
          if (p.category === "Online Reservation") {
            catBadge = '<span class="badge bg-primary">Reservation</span>';
          } else {
            catBadge =
              '<span class="badge bg-info text-dark">Online Order</span>';
          }

          let actionBtn = "";
          if (p.status === "pending") {
            actionBtn = `<button onclick="viewReceipt('${p.id}', '${p.receiptUrl}', '${p.amount}', '${p.customerName}', false)" class="btn btn-sm btn-orange"><i class="fa-solid fa-eye"></i> Verify</button>`;
          } else {
            actionBtn = `<button onclick="viewReceipt('${p.id}', '${p.receiptUrl}', '${p.amount}', '${p.customerName}', true)" class="btn btn-sm btn-secondary"><i class="fa-solid fa-file-invoice"></i> View</button>`;
          }
          tbody.innerHTML += `
                    <tr>
                        <td class="text-muted fw-bold">#${p.id.substring(1, 6).toUpperCase()}</td>
                        <td class="fw-bold">${p.customerName}</td>
                        <td>${catBadge}</td>
                        <td><small class="fw-bold">${p.formattedDate}</small><br><small class="text-muted">${p.formattedTime}</small></td>
                        <td class="fw-bold text-success">₱${p.amount}</td>
                        <td>${statusBadge}</td>
                        <td>${actionBtn}</td>
                    </tr>
                `;
        });
      } //----------- End of table

      // TAB FILTERING
      window.filterPayments = function (view, event) {
        currentView = view;
        document
          .querySelectorAll("#paymentTabs .nav-link")
          .forEach((link) => link.classList.remove("active"));
        event.target.classList.add("active");
        renderTable();
      };

      // verify/view receipt modal
      window.viewReceipt = function (
        id,
        imgUrl,
        amount,
        customerName,
        isHistory,
      ) {
        currentPaymentId = id;
        document.getElementById("modalCustomerName").innerText =
          "Name: " + customerName;
        document.getElementById("modalReceiptImg").src = imgUrl;
        document.getElementById("modalAmount").innerText = "Amount: ₱" + amount;

        if (isHistory) {
          document.getElementById("modalActions").classList.add("d-none");
        } else {
          document.getElementById("modalActions").classList.remove("d-none");
        }
        receiptModal.show();
      };

      // approve/reject receipt
      document
        .getElementById("approveBtn")
        .addEventListener("click", async () => {
          await update(ref(db, "payments/" + currentPaymentId), {
            status: "approved",
          });
          receiptModal.hide();
        });

      document
        .getElementById("rejectBtn")
        .addEventListener("click", async () => {
          await update(ref(db, "payments/" + currentPaymentId), {
            status: "rejected",
          });
          receiptModal.hide();
        }); //----------- End of Modal

      // Fake Data Generator for Testing
      window.addFakePayment = function () {
        const categories = ["Online Reservation", "Online Order"];
        const randomCat =
          categories[Math.floor(Math.random() * categories.length)];

        push(ref(db, "payments"), {
          customerName: "Customer",
          amount: "999",
          category: randomCat,
          timestamp: Date.now(),
          status: "pending",
          receiptUrl: "https://c.tenor.com/nsQ57a43PG0AAAAC/tenor.gif",
        });
      }; //----------- End of Fake Data Generator

      // logout
      document
        .getElementById("adminLogoutBtn")
        .addEventListener("click", () => {
          signOut(auth).then(() => {
            window.location.href = "login.html";
          });
        });
    </script>
  </body>
</html>
